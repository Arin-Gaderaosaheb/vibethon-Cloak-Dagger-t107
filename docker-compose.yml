version: '3.8'

services:
  # ─── MySQL Database ───────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: aiml_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: aiml_learning_db
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/migrations/001_create_tables.sql:/docker-entrypoint-initdb.d/01_migrate.sql
      - ./backend/seeds/001_seed_modules.sql:/docker-entrypoint-initdb.d/02_seed.sql
    networks:
      - aiml_network
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aiml_backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: aiml_learning_db
      JWT_SECRET: aiml_super_secret_jwt_key_vibethon_2026
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - aiml_network

  # ─── Frontend ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aiml_frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - aiml_network

volumes:
  mysql_data:

networks:
  aiml_network:
    driver: bridge
